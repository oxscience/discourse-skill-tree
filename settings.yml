tree_definition:
  type: string
  textarea: true
  default: '{"height":420,"nodes":[{"id":"training","category":"training","label":"Training","x":80,"y":280,"r":40},{"id":"ernaehrung","category":"ernaehrung","label":"Ernährung","x":190,"y":200,"r":30},{"id":"rehab","category":"klinik","label":"Rehab","x":300,"y":270,"r":36},{"id":"science","category":"forschung-evidenz","label":"Science","x":410,"y":180,"r":34},{"id":"tech-ki","category":"webinare","label":"Tech & KI","x":350,"y":80,"r":28},{"id":"neuro","category":"neurowissenschaften","label":["Neuro-","wissenschaften"],"x":500,"y":255,"r":36},{"id":"pain-performance","category":"pain-performance","label":"Pain & Performance","x":615,"y":200,"r":40},{"id":"symposien","category":"ox-symposien-pro","label":"Symposien","x":600,"y":350,"r":26}],"links":[["training","ernaehrung"],["ernaehrung","rehab"],["rehab","science"],["science","tech-ki"],["science","neuro"],["neuro","pain-performance"]]}'
  description:
    en: "Skill tree definition as JSON. nodes: id, category (slug), label (fallback when the category is not visible), x/y/r (position and radius in a 680-wide coordinate space). links: pairs of node ids. Invalid JSON falls back to the built-in default."
    de: "Skill-Tree-Definition als JSON. nodes: id, category (Slug), label (Fallback wenn die Kategorie nicht sichtbar ist), x/y/r (Position und Radius in einem 680 breiten Koordinatenraum). links: Paare von Node-IDs. Ungültiges JSON fällt auf den eingebauten Standard zurück."


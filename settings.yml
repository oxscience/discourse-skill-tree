tree_definition:
  type: string
  textarea: true
  default: '{"height":470,"nodes":[{"id":"science","category":"forschung-evidenz","label":"Science","x":300,"y":220,"r":38},{"id":"tech-ki","category":"webinare","label":"Tech & KI","x":150,"y":90,"r":26},{"id":"training","category":"training","label":"Training","x":430,"y":90,"r":36},{"id":"ernaehrung","category":"ernaehrung","label":"Ernährung","x":600,"y":140,"r":28},{"id":"rehab","category":"klinik","label":"Rehab","x":430,"y":330,"r":34},{"id":"neuro","category":"neurowissenschaften","label":["Neuro-","wissenschaften"],"x":160,"y":330,"r":32},{"id":"pain-performance","category":"pain-performance","label":"Pain & Performance","x":300,"y":390,"r":38},{"id":"symposien","category":"ox-symposien-pro","label":"Symposien","x":610,"y":395,"r":24}],"links":[["science","tech-ki"],["science","training"],["science","rehab"],["science","neuro"],["training","ernaehrung"],["rehab","pain-performance"],["neuro","pain-performance"]],"overlaps":[["training","rehab"],["ernaehrung","rehab"],["ernaehrung","symposien"]]}'
  description:
    en: "Skill tree definition as JSON. nodes: id, category (slug), label (fallback when the category is not visible), x/y/r (position and radius in a 680-wide coordinate space). links: pairs of node ids (learning path, solid). overlaps: pairs of node ids (thematic closeness, dashed). Invalid JSON falls back to the built-in default."
    de: "Skill-Tree-Definition als JSON. nodes: id, category (Slug), label (Fallback wenn die Kategorie nicht sichtbar ist), x/y/r (Position und Radius in einem 680 breiten Koordinatenraum). links: Paare von Node-IDs (Lernpfad, durchgezogen). overlaps: Paare von Node-IDs (inhaltliche Nähe, gestrichelt). Ungültiges JSON fällt auf den eingebauten Standard zurück."

pricing_url:
  type: string
  default: "https://outoftheb-ox.de/pages/oxcampus#ox-pricing"
  description:
    en: "Target URL when a locked (Pro) node is clicked."
    de: "Ziel-URL beim Klick auf einen gesperrten (Pro-)Knoten."

tree_definition:
  type: string
  textarea: true
  default: '{"height":460,"nodes":[{"id":"science","category":"forschung-evidenz","label":"Science","x":90,"y":215,"r":38},{"id":"tech-ki","category":"webinare","label":"Tech & KI","x":195,"y":70,"r":26},{"id":"training","category":"training","label":"Training","x":300,"y":90,"r":36},{"id":"rehab","category":"klinik","label":"Rehab","x":300,"y":215,"r":36},{"id":"neuro","category":"neurowissenschaften","label":["Neuro-","wissenschaften"],"x":300,"y":345,"r":34},{"id":"ernaehrung","category":"ernaehrung","label":"Ernährung","x":540,"y":90,"r":30},{"id":"pain-performance","category":"pain-performance","label":"Pain & Performance","x":540,"y":280,"r":40},{"id":"symposien","category":"ox-symposien-pro","label":"Symposien","x":615,"y":400,"r":24}],"links":[["science","tech-ki"],["science","training"],["science","rehab"],["science","neuro"],["training","ernaehrung"],["rehab","pain-performance"],["neuro","pain-performance"]]}'
